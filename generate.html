<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generate Certificate</title>

<!-- PDF library -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<!-- QR code -->
<script src="https://cdn.jsdelivr.net/npm/qrcode"></script>

<!-- SHA256 -->
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.js"></script>

<style>

body{
font-family:serif;
background:#f4f6f9;
text-align:center;
padding:40px;
}

/* FORM */

form{
margin-bottom:40px;
}

input{
padding:10px;
margin:10px;
width:220px;
}

/* CERTIFICATE */

#certificateTemplate{

width:1000px;
padding:60px;
background:#FFFFFF;

border:14px solid #0B1F3A;

margin:auto;

position:relative;

}

/* GOLD LINE */

.gold-line{
height:8px;
background:#C9A227;
margin-bottom:30px;
}

.title{
color:#0B1F3A;
}

.subtitle{
color:#333333;
}

.course{
color:#C9A227;
}

.signature-section{

display:flex;

justify-content:space-between;

margin-top:80px;

padding:0 100px;

}

.cert-id{

position:absolute;

bottom:20px;

left:40px;

font-size:12px;

color:#444;

}

</style>

</head>

<body>

<h1>Generate Certificate</h1>

<form id="certificateForm">

<input type="text" id="studentName" placeholder="Student Name" required>

<input type="text" id="courseTitle" placeholder="Course Title" required>

<input type="date" id="completionDate" required>

<button type="submit">Generate Certificate</button>

</form>

<!-- CERTIFICATE TEMPLATE -->

<div id="certificateTemplate">

<div class="gold-line"></div>

<img src="../assets/logo.png" width="120">

<h1 class="title">InnovaSci AI Labs</h1>

<h3 class="subtitle">Center for Computational Science & AI Research</h3>

<h2 style="color:#C9A227;">CERTIFICATE OF COMPLETION</h2>

<p>This certifies that</p>

<h1 id="certStudent" class="title"></h1>

<p>has successfully completed the course</p>

<h2 id="certCourse" class="course"></h2>

<p id="certDate"></p>

<div class="signature-section">

<div>

<img src="../assets/signature.png" width="180">

<hr>

<p>Director</p>

</div>

<div>

<canvas id="qrCode"></canvas>

<p style="font-size:12px;">Scan to verify</p>

</div>

</div>

<p class="cert-id">

Certificate ID:
<span id="certId"></span>

</p>

</div>

<script type="module" src="../assets/js/certificate.js"></script>

</body>

</html>
