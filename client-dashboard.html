<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard - InnovaSci AI Labs</title>
<link rel="stylesheet" href="../assets/css/dashboard.css">
<script type="module" src="../assets/js/dashboard.js" defer></script>
</head>
<body>
  <header>
    <h1>Client Dashboard</h1>
    <button id="logoutBtn">Logout</button>
  </header>

  <nav>
    <ul>
      <li><a href="client-dashboard.html">🏠 Dashboard</a></li>
      <li><a href="projects.html">📂 My Projects</a></li>
      <li><a href="invoices.html">💰 Invoices</a></li>
      <li><a href="messages.html">✉️ Messages</a></li>
    </ul>
  </nav>

  <main>
    <!-- Submit Project Form -->
    <section id="submit-project">
      <h2>Submit New Project</h2>
      <form id="projectForm">
        <label>Title: <input type="text" id="projectTitle" required></label>
        <label>Description:
          <textarea id="projectDescription" required></textarea>
        </label>
        <label>Upload Files:
          <input type="file" id="projectFiles" multiple>
        </label>
        <button type="submit">Submit Project</button>
      </form>
      <div id="projectMsg"></div>
    </section>

    <!-- My Projects / Progress -->
    <section id="my-projects">
      <h2>My Projects</h2>
      <ul id="projectsList"></ul>
    </section>

</main>
<!-- Hakeem AI Chatbot -->
<div class="chat-widget" id="chatWidget">
  <div class="chat-header" onclick="toggleChat()">Hakeem 🤖</div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="Type your question..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<link rel="stylesheet" href="../assets/css/chatbot.css">
<script type="module" src="../assets/js/chatbot.js"></script>
</body>
</html>
<!-- Toast Notifications Container -->
<div id="toastContainer" class="toast-container"></div>
